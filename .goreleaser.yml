# goreleaser config for office-addin-mcp.
#
# Local snapshot build (no remote required):
#   goreleaser release --snapshot --clean
#
# Build binaries for npm publish (no GitHub release):
#   goreleaser build --clean

version: 2

project_name: office-addin-mcp

before:
  hooks:
    - go mod tidy

builds:
  - id: office-addin-mcp
    main: ./cmd/office-addin-mcp
    binary: office-addin-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: '{{ .Tag }}-next'

changelog:
  disable: true # CHANGELOG.md is hand-curated.

release:
  disable: true # No remote publish in v0.1.0; archives end up in dist/ locally.
